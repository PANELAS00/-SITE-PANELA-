[build]
  command = ""
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/products/*"
  to = "/.netlify/functions/api/products/:splat"
  status = 200

[[redirects]]
  from = "/assets_next/image/*"
  to = "/.netlify/functions/api/_next/image/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
