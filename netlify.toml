[build]
  command = ""
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["public/images/**", "public/data/**", "public/index.html"]

[[redirects]]
  from = "/api/config/whatsapp"
  to = "/.netlify/functions/config-whatsapp"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/products/*"
  to = "/.netlify/functions/api/products/:splat"
  status = 200

[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200

[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

[[redirects]]
  from = "/_next/image"
  to = "/.netlify/functions/api/_next/image"
  status = 200

[[redirects]]
  from = "/_next/image/*"
  to = "/.netlify/functions/api/_next/image/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
